<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Audiobooks</title>
<link rel="stylesheet" href="spc.css">

<style>

h1 {
    margin-bottom: 30px;
}

/* GRID */
.grid {
    display: flex;
    gap: 25px;
    flex-wrap: wrap;
}

.book {
    width: 250px;
    cursor: pointer;
    transition: 0.3s;
}

.book:hover {
    transform: scale(1.05);
}

.book img {
    width: 100%;
    height: 350px;
    object-fit: cover;
    border-radius: 10px;
}

.book h3 {
    margin-top: 10px;
}
</style>
</head>

<body>
<!-- NAVBAR -->
<header>
    <div class="logo">
        <a href="index.html"><img src="assets/logo.png" alt="SPC Logo"></a>
    </div>

    <nav>
        <a href="index.html">Home</a>
        <a href="series.html">Series</a>
        <a href="characters.html">Characters</a>
        <a href="audiobooks.html">Audiobooks</a>
        <a href="about.html">About</a>
    </nav>
</header>


<h1>Audiobooks</h1>

<div class="grid">

    <div class="book" onclick="goToBook('black_sun_origins')">
        <img src="assets/hero7.jpg">
        <h3>Black Sun Origins</h3>
    </div>

    <div class="book" onclick="goToBook('sentinels')">
        <img src="assets/hero4.jpg">
        <h3>Sentinels</h3>
    </div>

</div>

<script>
function goToBook(book) {
    window.location.href = book + ".html";
}
</script>

</body>
</html>
