<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sound Puppet Comics</title>
<link rel="stylesheet" href="spc.css">

<style>

/* HERO */
.hero {
    height: 85vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9));
}

.hero h1 {
    font-size: 60px;
    font-weight: 900;
}

.hero span {
    color: var(--orange);
}

.hero p {
    margin-top: 15px;
    color: #ccc;
}

.hero button {
    margin-top: 25px;
    padding: 12px 30px;
    border: none;
    background: var(--orange);
    color: white;
    font-weight: bold;
    cursor: pointer;
    border-radius: 5px;
    transition: 0.3s;
}

.hero button:hover {
    background: white;
    color: black;
}

/* SECTION */
section {
    padding: 60px 50px;
}

.section-title {
    font-size: 28px;
    margin-bottom: 30px;
    border-left: 6px solid var(--orange);
    padding-left: 10px;
}

/* CARDS */
.series {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
}

.card {
    background: #111;
    width: 260px;
    border-radius: 10px;
    overflow: hidden;
    border: 2px solid #222;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    border-color: var(--orange);
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

.card-content {
    padding: 15px;
}

.card h3 {
    color: var(--orange);
}

.card p {
    color: #bbb;
}

.background-slideshow {
    position: fixed;
    top: 80px; /* Adjust for header height */
    left: 0;
    width: 100%;
    height: calc(100vh - 80px);
    z-index: -1;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    opacity: 0.15;
    filter: blur(2px);
    transition: background-image 1s ease-in-out;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<header>
    <div class="logo">
        <a href="index.html"><img src="assets/logo.png" alt="SPC Logo"></a>
    </div>

    <nav>
        <a href="index.html">Home</a>
        <a href="series.html">Series</a>
        <a href="characters.html">Characters</a>
        <a href="audiobooks.html">Audiobooks</a>
        <a href="about.html">About</a>
    </nav>
</header>
<div class="background-slideshow"></div>
<!-- HERO -->
<div class="hero">
    <div>
        <h1><span>SOUND PUPPET</span> COMICS</h1>
        <p>Puppets made of sound and imagination.</p>
        <button onclick="window.location.href='login.html'">Enter Universe</button>
    </div>
</div>

<!-- SERIES -->
<section>
    <div class="section-title">Featured Series</div>

    <div class="series">

        <a href="paragons.html" class="card">
            <img src="assets/hero5.jpg">
            <div class="card-content">
                <h3>The Paragons</h3>
                <p>Power beyond gods.</p>
            </div>
        </a>

        <a href="sentinels.html" class="card">
            <img src="assets/hero4.jpg">
            <div class="card-content">
                <h3>Sentinels</h3>
                <p>Defenders of existence.</p>
            </div>
        </a>

        <a href="cometson.html" class="card">
            <img src="assets/hero3.jpg">
            <div class="card-content">
                <h3>Cometson</h3>
                <p>Born of the stars.</p>
            </div>
        </a>

    </div>
</section>

<!-- FOOTER -->
<footer>
    <p>©️ 2026 Sound Puppet Comics</p>
</footer>

<script>
const images = [
    "assets/hero1.jpg",
    "assets/hero2.jpg",
    "assets/hero3.jpg",
    "assets/hero4.jpg"
];
const slideshow = document.querySelector('.background-slideshow');
let currentIndex = 0;

function updateSlideshow() {
    slideshow.style.backgroundImage = `url('${images[currentIndex]}')`;
    currentIndex = (currentIndex + 1) % images.length;
}

updateSlideshow();
setInterval(updateSlideshow, 5000);
</script>

</body>
</html>
