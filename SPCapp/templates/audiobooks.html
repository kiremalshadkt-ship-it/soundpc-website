{% extends 'base.html' %}
{% load static %}

{% block title %}Audiobooks | Sound Puppet Comics{% endblock %}

{% block extra_css %}
<style>
section {
    padding: 60px 50px;
}

.section-title {
    font-size: 28px;
    margin-bottom: 30px;
    border-left: 6px solid var(--orange);
    padding-left: 10px;
}

/* GRID */
.grid {
    display: flex;
    gap: 25px;
    flex-wrap: wrap;
}

.book {
    width: 250px;
    cursor: pointer;
    transition: 0.3s;
}

.book:hover {
    transform: scale(1.05);
}

.book img {
    width: 100%;
    height: 350px;
    object-fit: cover;
    border-radius: 10px;
    border: 2px solid #222;
}

.book h3 {
    margin-top: 10px;
    color: var(--orange);
}
</style>
{% endblock %}

{% block content %}
<section>
    <h2 class="section-title">Audiobooks</h2>
    <div class="grid">
        <a href="{% url 'black_sun_origins' %}" style="text-decoration: none;">
            <div class="book">
                <img src="{% static 'assets/hero7.jpg' %}" alt="Black Sun Origins">
                <h3>Black Sun Origins</h3>
            </div>
        </a>
        <a href="{% url 'sentinels' %}" style="text-decoration: none;">
            <div class="book">
                <img src="{% static 'assets/hero4.jpg' %}" alt="Sentinels">
                <h3>Sentinels</h3>
            </div>
        </a>
    </div>
</section>
{% endblock %}
